<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vit&Dasha wedding</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="content">
      <section class="intro">
        <div class="intro_name-block">
          <div class="intro_name_logo">
            <span class="intro_name_couple-text">Дарья</span>
            <span class="intro_name_couple-text">&</span>
            <span class="intro_name_couple-text">Виталий</span>
          </div>
          <img
            src="/assets//couple_resized_compressed.webp"
            alt="intro-couple-pic"
            fetchpriority="high"
            object-fit="contain"
            class="intro-img"
          />
        </div>
        <div class="intro_date-block">
          <span class="intro_date-block_date">29 мая 2026</span>
          <span class="intro_date-block_date-text">ждем вас</span>
        </div>
        <div class="intro_counter-block">
          <span class="intro_counter-block_date">
            <b class="counter-value">04</b>
            <span class="rest-time">недель</span>
          </span>
          <span class="intro_counter-block_date">
            <b class="counter-value">04</b>
            <span class="rest-time">дней</span>
          </span>
          <span class="intro_counter-block_date">
            <b class="counter-value">04</b>
            <span class="rest-time">часов</span>
          </span>
          <span class="intro_counter-block_date">
            <b class="counter-value">04</b>
            <span class="rest-time">минут</span>
          </span>
          <span class="intro_counter-block_date">
            <b class="counter-value">04</b>
            <span class="rest-time">секунд</span>
          </span>
        </div>
      </section>
      <section class="description"></section>
      <section class="timetable"></section>
      <section class="location"></section>
    </div>
  </body>
</html>
